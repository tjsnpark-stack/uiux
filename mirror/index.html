<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="css/swiper-bundle.min.css">

    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
    <script src="js/main.js"></script>
    <title>Mirrorlessworld</title>
</head>
<body>
    <div class="id">
        <header></header>
        <main class="container">
            <div class="fixed_photo"><img src="images/visual01.png" alt="후지필름카메라"></div>
            <section class="visual">
                    <div class="tit own"><span>OWN</span></div>
                    <div class="tit the"><span>THE MOMENT</span></div>
                    <div class="tit make"><span>MAKE IT YOURS</span></div>
            </section>
            <section class="product">
                <div class="wrapper">
                    <div class="list">
                        <ul>
                            <li class="Camear">
                                <a href="#n"><span>Camear</span></a>
                            </li>
                            <li class="Lens">
                                <a href="#n"><span>Lens</span></a>
                            </li>
                            <li class="Phone">
                                <a href="#n"><span>Phone</span></a>
                            </li>
                            <li class="Lighting">
                                <a href="#n"><span>Lighting</span></a>
                            </li>
                            <li class="Acc">
                                <a href="#n"><span>Acc</span></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </section>
            <section class="c_type">
                <div class="tit">
                    <h2>Which Brand Are<br> You Looking For?</h2>
                    <p>촬영 스타일에 맞는 카메라를 브랜드별로 쉽게 찾아보세요!</p>
                </div>
                <div class="list">
                    <div class="swiper"> <!-- 팝업의 높이와 넓이를 css에서 줄 수 있는 요소 -->
                        <ul class="swiper-wrapper"> <!-- 각 팝업 콘텐츠를 감싸는 요소 -->
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type01.jpg" alt="파나소닉카메라"></div>
                                </a>
                            </li>
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type02.jpg" alt="캐논카메라"></div>
                                </a>
                            </li>
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type03.jpg" alt="후지필름카메라"></div>
                                </a>
                            </li>
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type04.jpg" alt="니콘카메라"></div>
                                </a>
                            </li>
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type05.jpg" alt="소니카메라"></div>
                                </a>
                            </li> <!-- 팝업 요소들 (div로 해도 상관없음) -->
                        </ul>
                    </div>
                </div>
                <div class="more">
                    <a href="#n">
                        <span>view more</span>
                    </a>
                </div>
            </section>
            <section class="most">
                <div class="wrapper">
                    <div class="tit">
                        <h2>Most Popular</h2>
                        <p>가장 많은 사랑을 받는 상품이에요!</p>
                    </div>
                    <div class="list">
                        <div class="swiper"> <!-- 팝업의 높이와 넓이를 css에서 줄 수 있는 요소 -->
                        <ul class="swiper-wrapper"> <!-- 각 팝업 콘텐츠를 감싸는 요소 -->
                            <li class="swiper-slide">
                                <a href="#n">
                                    <div class="photo"><img src="images/c_type01.jpg" alt="파나소닉카메라"></div>
                                </a>
                            </li>
                        </ul>    
                    </div>
                </div>
            </section>
            <section class="new"></section>
            <section class="review"></section>
            <section class="brand"></section>
        </main>
        <footer></footer>
    </div>
</body>
</html>
